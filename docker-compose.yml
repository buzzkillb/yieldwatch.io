services:
  db:
    image: postgres:17-alpine
    container_name: treasury-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-treasury}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-treasury}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-treasury} -d ${POSTGRES_DB:-treasury}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    image: oven/bun:1
    container_name: treasury-api
    working_dir: /app
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-treasury}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-treasury}
      PORT: ${PORT:-3000}
      HOST: 0.0.0.0
      CRON_TZ: ${CRON_TZ:-America/New_York}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "127.0.0.1:${PORT:-3000}:${PORT:-3000}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: bun run src/index.ts

  scheduler:
    image: oven/bun:1
    container_name: treasury-scheduler
    working_dir: /app
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: ${POSTGRES_USER:-treasury}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-treasury}
      CRON_TZ: ${CRON_TZ:-America/New_York}
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: bun run src/services/scheduler.ts

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: treasury-network
    driver: bridge
