name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]

jobs:
  test-local:
    name: Test Local Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cleanup any previous runs
        run: |
          docker compose down -v 2>/dev/null || true

      - name: Start local database
        env:
          POSTGRES_PASSWORD: test_secret_password
        run: |
          docker compose up -d db
          docker compose ps
          docker compose logs db --tail 20

      - name: Wait for database to be ready
        run: |
          for i in {1..30}; do
            if docker compose exec -T db pg_isready -U treasury > /dev/null 2>&1; then
              echo "Database is ready"
              exit 0
            fi
            echo "Waiting for database... ($i/30)"
            sleep 2
          done
          echo "Database failed to start"
          exit 1

      - name: Install dependencies and run database migrations
        env:
          POSTGRES_PASSWORD: test_secret_password
        run: |
          docker compose run --rm api sh -c "bun install && bun run drizzle-kit push"

      - name: Start all services
        env:
          POSTGRES_PASSWORD: test_secret_password
        run: docker compose up -d

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "API failed to start"
          docker compose logs api
          exit 1

      - name: Test health endpoint
        run: curl -sf http://localhost:3000/health | grep -q '"status":"ok"' && echo "Health check passed"

      - name: Test latest rates endpoint
        run: |
          curl -sf http://localhost:3000/api/rates/latest | grep -q '"success":true' && echo "Latest rates check passed"

      - name: Check scheduler logs
        run: docker compose logs scheduler --tail 20

      - name: Cleanup
        if: always()
        run: docker compose down -v

  test-compose-validate:
    name: Validate Docker Compose Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Docker Compose v2
        run: |
          DOCKER_CONFIG=${DOCKER_CONFIG:-~/.docker}
          mkdir -p $DOCKER_CONFIG/cli-plugins
          curl -SL https://github.com/docker/compose/releases/download/v2.24.0/docker-compose-linux-x86_64 -o $DOCKER_CONFIG/cli-plugins/docker-compose
          chmod +x $DOCKER_CONFIG/cli-plugins/docker-compose

      - name: Validate docker-compose.yml
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validate docker-compose.prod.yml
        run: docker compose -f docker-compose.prod.yml config --quiet

  test-db-schema:
    name: Verify Database Schema
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: treasury
          POSTGRES_PASSWORD: treasury_secret_password
          POSTGRES_DB: treasury
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        run: cd api && bun install

      - name: Run migrations
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: treasury
          POSTGRES_PASSWORD: treasury_secret_password
          POSTGRES_DB: treasury
        run: cd api && bun run drizzle-kit push
