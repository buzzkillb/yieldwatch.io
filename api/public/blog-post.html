<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Daily Summary | U.S. Treasury Yield Curve</title>
  <meta name="description" content="Treasury yield curve daily analysis" id="meta-desc">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%236366f1' rx='15' width='100' height='100'/%3E%3Cpath d='M20 70 L35 55 L50 65 L65 40 L80 45' stroke='white' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='80' cy='45' r='6' fill='white'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #0f0f18;
      --bg-card: #16161f;
      --bg-tertiary: #1a1a25;
      --border-color: #2a2a3a;
      --text-primary: #f0f0f5;
      --text-secondary: #a0a0b0;
      --text-muted: #606070;
      --accent: #6366f1;
      --accent-hover: #818cf8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    .header {
      background: linear-gradient(145deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      border-bottom: 1px solid var(--border-color);
      padding: 1.5rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .header-content {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--text-primary);
    }

    .logo svg {
      width: 36px;
      height: 36px;
    }

    .logo-text {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .nav {
      display: flex;
      gap: 2rem;
    }

    .nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .nav a:hover, .nav a.active {
      color: var(--accent);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 2rem;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: var(--accent);
    }

    .post-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .post-date {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    .post-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .blog-content {
      margin-bottom: 2.5rem;
    }

    .blog-summary {
      font-size: 1.1rem;
      line-height: 1.8;
      color: var(--text-primary);
    }

    .chart-section {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .chart-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .chart-wrapper {
      position: relative;
      height: 300px;
    }

    .rates-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.5rem;
      margin-top: 1.5rem;
    }

    .rate-item {
      background: var(--bg-tertiary);
      border-radius: 8px;
      padding: 0.75rem;
      text-align: center;
    }

    .rate-maturity {
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.25rem;
    }

    .rate-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .loading, .error {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
    }

    .error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      color: #ef4444;
    }

    @media (max-width: 768px) {
      .header {
        padding: 1rem;
      }

      .nav {
        gap: 1rem;
      }

      .container {
        padding: 1rem;
      }

      .chart-wrapper {
        height: 250px;
      }

      .rates-grid {
        grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="/" class="logo">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect fill="#6366f1" rx="15" width="100" height="100"/>
          <path d="M20 70 L35 55 L50 65 L65 40 L80 45" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="80" cy="45" r="6" fill="white"/>
        </svg>
        <span class="logo-text">Treasury Yield</span>
      </a>
      <nav class="nav">
        <a href="/">Dashboard</a>
        <a href="/blog" class="active">Daily Summaries</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <a href="/blog" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
      Back to summaries
    </a>

    <div id="content">
      <div class="loading">Loading summary...</div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    const GRADIENT_COLORS = [
      '#6366f1', '#7c7ff2', '#9597f3', '#a5aaf5', '#b5bdf6',
      '#c5d1f8', '#d5e4f9', '#e5f7fb', '#d4a5f9', '#c493f8',
      '#b480f7', '#a46df6', '#945af5', '#6366f1'
    ];

    const MATURITY_ORDER = ['4WK', '6WK', '2MO', '3MO', '4MO', '6MO', '1YR', '2YR', '3YR', '5YR', '7YR', '10YR', '20YR', '30YR'];

    async function loadPost() {
      const pathParts = window.location.pathname.split('/');
      const date = pathParts[pathParts.length - 1];

      if (!date || !date.match(/^\d{4}-\d{2}-\d{2}$/)) {
        document.getElementById('content').innerHTML = '<div class="error">Invalid date format</div>';
        return;
      }

      try {
        const response = await fetch(`/api/blog/${date}`);
        const data = await response.json();

        if (!data.success) {
          document.getElementById('content').innerHTML = `<div class="error">${data.error || 'Failed to load summary'}</div>`;
          return;
        }

        const { dateFormatted, blogSummary, rates } = data.data;

        document.title = `${dateFormatted} | Treasury Yield Daily`;
        document.getElementById('page-title').textContent = `${dateFormatted} | Treasury Yield Daily`;
        document.getElementById('meta-desc').content = blogSummary.substring(0, 160);

        const chartColors = rates.map((_, i) => GRADIENT_COLORS[i % GRADIENT_COLORS.length]);

        const content = `
          <article>
            <header class="post-header">
              <p class="post-date">${dateFormatted}</p>
              <h1 class="post-title">Treasury Yield Curve Analysis</h1>
            </header>

            <div class="blog-content">
              <p class="blog-summary">${blogSummary}</p>
            </div>

            <section class="chart-section">
              <h2 class="chart-title">Yield Curve</h2>
              <div class="chart-wrapper">
                <canvas id="yieldChart"></canvas>
              </div>
              <div class="rates-grid">
                ${rates.map((r, i) => `
                  <div class="rate-item" style="border-top: 3px solid ${GRADIENT_COLORS[i % GRADIENT_COLORS.length]}">
                    <div class="rate-maturity">${r.maturity}</div>
                    <div class="rate-value">${r.rate.toFixed(2)}%</div>
                  </div>
                `).join('')}
              </div>
            </section>
          </article>
        `;

        document.getElementById('content').innerHTML = content;

        setTimeout(() => renderChart(rates, chartColors), 100);
      } catch (error) {
        console.error('Error loading post:', error);
        document.getElementById('content').innerHTML = '<div class="error">Failed to load summary. Please try again.</div>';
      }
    }

    function renderChart(rates, colors) {
      const ctx = document.getElementById('yieldChart').getContext('2d');

      const gradient = ctx.createLinearGradient(0, 0, 0, 300);
      gradient.addColorStop(0, 'rgba(99, 102, 241, 0.3)');
      gradient.addColorStop(1, 'rgba(99, 102, 241, 0)');

      new Chart(ctx, {
        type: 'line',
        data: {
          labels: rates.map(r => r.maturity),
          datasets: [{
            label: 'Yield',
            data: rates.map(r => r.rate),
            borderColor: colors,
            backgroundColor: gradient,
            borderWidth: 3,
            fill: true,
            tension: 0.4,
            pointRadius: 6,
            pointBackgroundColor: colors,
            pointBorderColor: '#fff',
            pointBorderWidth: 1,
            pointHoverRadius: 7,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(22, 22, 31, 0.95)',
              titleColor: '#f0f0f5',
              bodyColor: '#a0a0b0',
              borderColor: '#2a2a3a',
              borderWidth: 1,
              padding: 12,
              displayColors: false,
              callbacks: {
                label: (ctx) => `${ctx.parsed.y.toFixed(2)}%`
              }
            }
          },
          scales: {
            x: {
              grid: { color: 'rgba(42, 42, 58, 0.5)' },
              ticks: { color: '#606070', font: { size: 11 } }
            },
            y: {
              grid: { color: 'rgba(42, 42, 58, 0.5)' },
              ticks: {
                color: '#606070',
                font: { size: 11 },
                callback: (v) => v.toFixed(2) + '%'
              }
            }
          }
        }
      });
    }

    loadPost();
  </script>
</body>
</html>
