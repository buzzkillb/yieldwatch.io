  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #0f0f18;
      --bg-card: #16161f;
      --bg-tertiary: #1a1a25;
      --border-color: #2a2a3a;
      --text-primary: #f0f0f5;
      --text-secondary: #a0a0b0;
      --text-muted: #606070;
      --accent: #6366f1;
      --accent-hover: #818cf8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    .header {
      background: linear-gradient(145deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      border-bottom: 1px solid var(--border-color);
      padding: 1.5rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .header-content {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--text-primary);
    }

    .logo svg {
      width: 36px;
      height: 36px;
    }

    .logo-text {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .nav {
      display: flex;
      gap: 2rem;
    }

    .nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .nav a:hover, .nav a.active {
      color: var(--accent);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }

    .page-header {
      margin-bottom: 2rem;
      text-align: center;
    }

    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .filter-bar select {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
      cursor: pointer;
      min-width: 120px;
    }

    .filter-bar select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .content-wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .page-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .page-subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .summaries-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .summary-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .summary-card-link {
      text-decoration: none;
      display: block;
    }

    .summary-card-link:hover .summary-card {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.15);
    }

    .summary-date {
      font-size: 1.1rem;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }

    .mini-chart {
      width: 100%;
      height: 80px;
      margin-bottom: 0.75rem;
    }

    .mini-chart canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .summary-excerpt {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
      word-wrap: break-word;
    }

    .analysis-tag {
      color: var(--accent);
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
    }

    .error {
      text-align: center;
      padding: 2rem;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      color: #ef4444;
    }

    @media (max-width: 768px) {
      .header {
        padding: 1rem;
      }

      .nav {
        gap: 1rem;
      }

      .container {
        padding: 1rem;
      }

      .page-title {
        font-size: 1.5rem;
      }

      .filter-bar {
        gap: 0.5rem;
      }

      .filter-bar select {

        padding: 0.4rem 0.75rem;
        font-size: 0.85rem;
      }

      .reset-btn {

        font-size: 0.85rem;
      }

      .summary-card {
        padding: 1rem;
      }

      .summary-header {

      .footer-content {

    .footer {

    .footer-content {

    }

    .pagination {

      gap: 1.5rem;
    }

    .page-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border: 1px solid var(--accent);
      border-radius: 6px;
      transition: all 0.2s;
    }

    .page-link:hover {
      background: var(--accent);
      color: var(--bg-primary);
    }

    .page-info {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
  </style>

<body>
  <header class="header">
    <div class="header-content">
      <a href="/" class="logo">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect fill="#6366f1" rx="15" width="100" height="100"/>
          <path d="M20 70 L35 55 L50 65 L65 40 L80 45" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

        </svg>
        <span class="logo-text">Treasury Yield</span>

      <nav class="nav">
        <a href="/">Dashboard</a>
        <a href="/blog" class="active">Daily Summaries</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="page-header">
      <h1 class="page-title">Daily Summaries</h1>
      <p class="page-subtitle">AI-powered Treasury yield curve analysis</p>
    </div>

    <div class="content-wrap">
      <div class="filter-bar">
        <select id="yearFilter">
          <option value="">All Years</option>
        </select>
        <select id="monthFilter" disabled>
          <option value="">All Months</option>
        </select>
      </div>
      <div id="content">
        <div class="loading">Loading summaries...</div>
      </div>
      <div id="pagination" class="pagination"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    const CHART_COLORS = [
      '#6366f1', '#a855f7', '#ec4899', '#f43f5e', '#f97316', '#eab308',
      '#22c55e', '#14b8a6', '#06b6d4', '#3b82f6', '#8b5cf6', '#10b981',
      '#f59e0b', '#ef4444'
    ];

    const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June',
                    'July', 'August', 'September', 'October', 'November', 'December'];

    let availableYears = [];
    let currentPage = 1;
    let totalPages = 1;

    function getPageFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return Math.max(1, parseInt(params.get('page')) || 1);
    }

    function updateUrl(page, year, month) {
      const url = new URL(window.location);
      url.searchParams.set('page', page);
      if (year) url.searchParams.set('year', year);
      if (month) url.searchParams.set('month', month);
      window.history.pushState({}, '', url);
    }

    function getFiltersFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return {
        year: params.get('year') || '',
        month: params.get('month') || '',
        page: Math.max(1, parseInt(params.get('page')) || 1)
      };
    }

    async function loadAvailableYears() {
      try {
        const res = await fetch('/api/blog/years');
        const data = await res.json();
        if (data.success && data.data) {
          availableYears = data.data.sort().reverse();
          populateYearDropdown();
        }
      } catch (e) {
        console.error('Error loading years:', e);
      }
    }

    function populateYearDropdown() {
      const yearSelect = document.getElementById('yearFilter');
      yearSelect.innerHTML = '<option value="">All Years</option>';
      availableYears.forEach(year => {
        const opt = document.createElement('option');
        opt.value = year;
        opt.textContent = year;
        yearSelect.appendChild(opt);
      });

      const filters = getFiltersFromUrl();
      if (filters.year) {
        yearSelect.value = filters.year;
        populateMonthsDropdown(filters.year);
      }
    }

    function populateMonthsDropdown(year) {
      const monthSelect = document.getElementById('monthFilter');
      monthSelect.innerHTML = '<option value="">All Months</option>';
      monthSelect.disabled = !year;

      if (year) {
        const allMonths = ['01', '02', '03', '04', '05', '06', '07', '08', '09', '10', '11', '12'];
        allMonths.forEach((monthNum, idx) => {
          const opt = document.createElement('option');
          opt.value = monthNum;
          opt.textContent = MONTHS[idx];
          monthSelect.appendChild(opt);
        });
      }
    }

    async function loadSummaries() {
      const filters = getFiltersFromUrl();
      currentPage = filters.page;

      const yearSelect = document.getElementById('yearFilter');
      const monthSelect = document.getElementById('monthFilter');
      const year = yearSelect.value;
      const month = monthSelect.value;

      try {
        let url = `/api/blog/list?page=${currentPage}`;
        if (year) url += `&year=${year}`;
        if (month) url += `&month=${month}`;

        const res = await fetch(url);
        const data = await res.json();

        if (!data.success || !data.data.length) {
          document.getElementById('content').innerHTML = '<div class="error">No summaries found.</div>';
          document.getElementById('pagination').innerHTML = '';
          return;
        }

        totalPages = data.pagination.totalPages;
        renderSummaries(data.data);
        renderPagination();
      } catch (error) {
        console.error('Error loading summaries:', error);
        document.getElementById('content').innerHTML = '<div class="error">Failed to load summaries. Please try again.</div>';
      }
    }

    function renderSummaries(summaries) {
      const summariesHtml = summaries.map((item) => {
        const date = new Date(item.date + 'T00:00:00');
        const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

        return `
          <a href="/blog/${item.date}" class="summary-card-link">
            <article class="summary-card">
              <div class="summary-date">${dateStr}</div>
              <div class="analysis-tag">${item.hasFullPost ? 'Full analysis available' : 'Quick summary'}</div>
              <p class="summary-excerpt">${item.excerpt}</p>
            </article>
          </a>
        `;
      }).join('');

      document.getElementById('content').innerHTML = `<div class="summaries-list">${summariesHtml}</div>`;
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderPagination() {
      if (totalPages <= 1) {
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      const filters = getFiltersFromUrl();
      let html = '<div class="pagination-controls">';

      if (currentPage > 1) {
        html += `<button class="page-link" data-page="${currentPage - 1}">&larr; Previous</button>`;
      }

      html += `<span class="page-info">Page ${currentPage} of ${totalPages}</span>`;

      if (currentPage < totalPages) {
        html += `<button class="page-link" data-page="${currentPage + 1}">Next &rarr;</button>`;
      }

      html += '</div>';
      document.getElementById('pagination').innerHTML = html;

      document.querySelectorAll('.page-link').forEach(btn => {
        btn.addEventListener('click', () => {
          const filters = getFiltersFromUrl();
          const year = document.getElementById('yearFilter').value;
          const month = document.getElementById('monthFilter').value;
          updateUrl(parseInt(btn.dataset.page), year, month);
          loadSummaries();
        });
      });
    }

    function initFilters() {
      const yearSelect = document.getElementById('yearFilter');
      const monthSelect = document.getElementById('monthFilter');

      yearSelect.addEventListener('change', () => {
        populateMonthsDropdown(yearSelect.value);
        const filters = getFiltersFromUrl();
        updateUrl(1, yearSelect.value, monthSelect.value);
        loadSummaries();
      });

      monthSelect.addEventListener('change', () => {
        const filters = getFiltersFromUrl();
        updateUrl(1, yearSelect.value, monthSelect.value);
        loadSummaries();
      });

      const params = new URLSearchParams(window.location.search);
      if (params.get('year')) yearSelect.value = params.get('year');
      if (params.get('month')) monthSelect.value = params.get('month');
    }

    loadAvailableYears();
    initFilters();
    loadSummaries();
  </script>

    <div class="footer-content">
      <div class="footer-links">

      </div>
      <div class="footer-meta">Updated daily at 3:30 PM ET</div>
      <div class="footer-meta">Data: <span id="lastUpdated">Loading...</span></div>
    </div>
  </footer>
</body>
