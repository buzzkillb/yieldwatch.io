  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #0f0f18;
      --bg-card: #16161f;
      --bg-tertiary: #1a1a25;
      --border-color: #2a2a3a;
      --text-primary: #f0f0f5;
      --text-secondary: #a0a0b0;
      --text-muted: #606070;
      --accent: #6366f1;
      --accent-hover: #818cf8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    .header {
      background: linear-gradient(145deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      border-bottom: 1px solid var(--border-color);
      padding: 1.5rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .header-content {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--text-primary);
    }

    .logo svg {
      width: 36px;
      height: 36px;
    }

    .logo-text {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .nav {
      display: flex;
      gap: 2rem;
    }

    .nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .nav a:hover, .nav a.active {
      color: var(--accent);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem;
    }

    .page-header {
      margin-bottom: 2rem;
      text-align: center;
    }

    .content-wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .page-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
    }

    .page-subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .summaries-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .summary-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .summary-card-link {
      text-decoration: none;
      display: block;
    }

    .summary-card-link:hover .summary-card {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.15);
    }

    .summary-date {
      font-size: 1.1rem;
      color: var(--text-primary);
      margin-bottom: 0.75rem;
    }

    .mini-chart {
      width: 100%;
      height: 80px;
      margin-bottom: 0.75rem;
    }

    .mini-chart canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .summary-excerpt {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
      word-wrap: break-word;
    }

    .analysis-tag {
      color: var(--accent);
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
    }

    .error {
      text-align: center;
      padding: 2rem;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      color: #ef4444;
    }

    @media (max-width: 768px) {
      .header {
        padding: 1rem;

<body>
  <header class="header">
    <div class="header-content">
      <a href="/" class="logo">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect fill="#6366f1" rx="15" width="100" height="100"/>
          <path d="M20 70 L35 55 L50 65 L65 40 L80 45" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="80" cy="45" r="6" fill="white"/>
        </svg>
        <span class="logo-text">Treasury Yield</span>
      </a>
      <nav class="nav">
        <a href="/">Dashboard</a>
        <a href="/blog" class="active">Daily Summaries</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="page-header">
      <h1 class="page-title">Daily Summaries</h1>
      <p class="page-subtitle">AI-powered Treasury yield curve analysis</p>
    </div>

    <div class="content-wrap">
      <div id="content">
        <div class="loading">Loading summaries...</div>
      </div>
      <div id="pagination" class="pagination"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    const CHART_COLORS = [
      '#6366f1', '#a855f7', '#ec4899', '#f43f5e', '#f97316', '#eab308',
      '#22c55e', '#14b8a6', '#06b6d4', '#3b82f6', '#8b5cf6', '#10b981',
      '#f59e0b', '#ef4444'
    ];

    function getPageFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return Math.max(1, parseInt(params.get('page')) || 1);
    }

    function updateUrl(page) {
      const url = new URL(window.location);
      url.searchParams.set('page', page);
      window.history.pushState({}, '', url);
    }

    async function loadSummaries(page = 1) {
      try {
        const [ratesRes, summariesRes] = await Promise.all([
          fetch('/api/rates/latest'),
          fetch(`/api/blog/list?page=${page}`)
        ]);
        const ratesData = await ratesRes.json();
        const data = await summariesRes.json();

        if (ratesData.success && ratesData.data) {
          const lastUpdated = document.getElementById('lastUpdated');
          if (lastUpdated) {
            lastUpdated.textContent = ratesData.data.dateFormatted;
          }
        }

        if (!data.success || !data.data.length) {
          document.getElementById('content').innerHTML = '<div class="error">No summaries available yet.</div>';
          return;
        }

        const summariesHtml = data.data.map((item) => {
          const date = new Date(item.date + 'T00:00:00');
          const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

          return `
            <a href="/blog/${item.date}" class="summary-card-link">
              <article class="summary-card">
                <div class="summary-date">${dateStr}</div>
                <div class="mini-chart" id="chart-${item.date}">
                  <canvas id="canvas-${item.date}"></canvas>
                </div>
                <div class="analysis-tag">${item.hasFullPost ? 'Full analysis available' : 'Quick summary'}</div>
                <p class="summary-excerpt">${item.excerpt}</p>
              </article>
            </a>
          `;
        }).join('');

        document.getElementById('content').innerHTML = `<div class="summaries-list">${summariesHtml}</div>`;

        renderPagination(data.pagination, page);
        setTimeout(() => renderMiniCharts(data.data), 100);
      } catch (error) {
        console.error('Error loading summaries:', error);
        document.getElementById('content').innerHTML = '<div class="error">Failed to load summaries. Please try again.</div>';
      }
    }

    function renderPagination(pagination, currentPage) {
      if (!pagination || pagination.totalPages <= 1) {
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      const { totalPages, hasNextPage, hasPrevPage } = pagination;
      let html = '<div class="pagination-controls">';

      if (hasPrevPage) {
        html += `<a href="?page=${currentPage - 1}" class="page-link" data-page="${currentPage - 1}">&larr; Previous</a>`;
      }

      html += `<span class="page-info">Page ${currentPage} of ${totalPages}</span>`;

      if (hasNextPage) {
        html += `<a href="?page=${currentPage + 1}" class="page-link" data-page="${currentPage + 1}">Next &rarr;</a>`;
      }

      html += '</div>';
      document.getElementById('pagination').innerHTML = html;

      document.querySelectorAll('.page-link').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const page = parseInt(link.dataset.page);
          updateUrl(page);
          loadSummaries(page);
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });
    }

    function renderMiniCharts(summaries) {
      summaries.forEach(async (item) => {
        try {
          const response = await fetch(`/api/blog/${item.date}`);
          const data = await response.json();

          if (!data.success || !data.data?.rates?.length) return;

          const rates = data.data.rates;
          const canvas = document.getElementById(`canvas-${item.date}`);
          if (!canvas) return;

          const ctx = canvas.getContext('2d');

          const lineGradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
          lineGradient.addColorStop(0, '#2a2a3a');
          lineGradient.addColorStop(1, '#f0f0f5');

          new Chart(ctx, {
            type: 'line',
            data: {
              labels: rates.map(r => r.maturity),
              datasets: [{
                data: rates.map((r, i) => ({ x: i, y: r.rate })),
                borderColor: lineGradient,
                backgroundColor: 'transparent',
                fill: false,
                tension: 0.4,
                pointRadius: 3,
                pointBackgroundColor: CHART_COLORS,
                borderWidth: 2,
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false }, tooltip: { enabled: false } },
              scales: {
                x: { display: false },
                y: { display: false }
              },
              animation: false
            }
          });
        } catch (e) {
          console.error('Error rendering mini chart:', e);
        }
      });
    }

    const initialPage = getPageFromUrl();
    loadSummaries(initialPage);
  </script>
  <footer class="footer">
    <div class="footer-content">
      <div class="footer-links">
        <a href="/faq">FAQ</a>

        <span class="divider">|</span>
        <a href="https://home.treasury.gov" target="_blank" rel="noopener noreferrer">U.S. Treasury</a>
      </div>
      <div class="footer-meta">Updated daily at 3:30 PM ET</div>
      <div class="footer-meta">Data: <span id="lastUpdated">Loading...</span></div>
    </div>
  </footer>
</body>
