<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Summaries | U.S. Treasury Yield Curve</title>
  <meta name="description" content="Daily Treasury yield curve summaries with AI-powered analysis">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%236366f1' rx='15' width='100' height='100'/%3E%3Cpath d='M20 70 L35 55 L50 65 L65 40 L80 45' stroke='white' stroke-width='8' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='80' cy='45' r='6' fill='white'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #0f0f18;
      --bg-card: #16161f;
      --bg-tertiary: #1a1a25;
      --border-color: #2a2a3a;
      --text-primary: #f0f0f5;
      --text-secondary: #a0a0b0;
      --text-muted: #606070;
      --accent: #6366f1;
      --accent-hover: #818cf8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    .header {
      background: linear-gradient(145deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
      border-bottom: 1px solid var(--border-color);
      padding: 1.5rem 2rem;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .header-content {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      color: var(--text-primary);
    }

    .logo svg {
      width: 36px;
      height: 36px;
    }

    .logo-text {
      font-size: 1.25rem;
      font-weight: 600;
    }

    .nav {
      display: flex;
      gap: 2rem;
    }

    .nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .nav a:hover, .nav a.active {
      color: var(--accent);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }

    .page-header {
      margin-bottom: 2rem;
      text-align: center;
    }

    .page-title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--accent), #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .page-subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
    }

    .summaries-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .summary-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .summary-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(99, 102, 241, 0.15);
    }

    .summary-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
      gap: 1rem;
    }

    .summary-date {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .summary-date strong {
      display: block;
      font-size: 1.1rem;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .mini-chart {
      flex-shrink: 0;
      width: 140px;
      height: 60px;
    }

    .mini-chart svg {
      width: 100%;
      height: 100%;
    }

    .summary-excerpt {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .read-more {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
    }

    .error {
      text-align: center;
      padding: 2rem;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 12px;
      color: #ef4444;
    }

    @media (max-width: 768px) {
      .header {
        padding: 1rem;
      }

      .nav {
        gap: 1rem;
      }

      .container {
        padding: 1rem;
      }

      .page-title {
        font-size: 1.5rem;
      }

      .summary-card {
        padding: 1rem;
      }

      .summary-header {
        flex-direction: column;
      }

      .mini-chart {
        width: 100%;
        height: 80px;
      }
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="/" class="logo">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect fill="#6366f1" rx="15" width="100" height="100"/>
          <path d="M20 70 L35 55 L50 65 L65 40 L80 45" stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="80" cy="45" r="6" fill="white"/>
        </svg>
        <span class="logo-text">Treasury Yield</span>
      </a>
      <nav class="nav">
        <a href="/">Dashboard</a>
        <a href="/blog" class="active">Daily Summaries</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="page-header">
      <h1 class="page-title">Daily Summaries</h1>
      <p class="page-subtitle">AI-powered Treasury yield curve analysis</p>
    </div>

    <div id="content">
      <div class="loading">Loading summaries...</div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    const MATURITY_ORDER = ['4WK', '6WK', '2MO', '3MO', '4MO', '6MO', '1YR', '2YR', '3YR', '5YR', '7YR', '10YR', '20YR', '30YR'];
    const GRADIENT_COLORS = [
      '#6366f1', '#7c7ff2', '#9597f3', '#a5aaf5', '#b5bdf6',
      '#c5d1f8', '#d5e4f9', '#e5f7fb', '#d4a5f9', '#c493f8',
      '#b480f7', '#a46df6', '#945af5', '#6366f1'
    ];

    async function loadSummaries() {
      try {
        const response = await fetch('/api/blog/list');
        const data = await response.json();

        if (!data.success || !data.data.length) {
          document.getElementById('content').innerHTML = '<div class="error">No summaries available yet.</div>';
          return;
        }

        const summariesHtml = data.data.map((item, index) => {
          const date = new Date(item.date + 'T00:00:00');
          const dateStr = date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

          return `
            <article class="summary-card" onclick="location.href='/blog/${item.date}'">
              <div class="summary-header">
                <div class="summary-date">
                  <strong>${dateStr}</strong>
                  ${item.hasFullPost ? 'Full analysis available' : 'Quick summary'}
                </div>
                <div class="mini-chart" id="chart-${index}">
                  <canvas id="canvas-${index}"></canvas>
                </div>
              </div>
              <p class="summary-excerpt">${item.excerpt}</p>
              <span class="read-more">
                Read full analysis
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
              </span>
            </article>
          `;
        }).join('');

        document.getElementById('content').innerHTML = `<div class="summaries-list">${summariesHtml}</div>`;

        setTimeout(() => renderMiniCharts(data.data), 100);
      } catch (error) {
        console.error('Error loading summaries:', error);
        document.getElementById('content').innerHTML = '<div class="error">Failed to load summaries. Please try again.</div>';
      }
    }

    function renderMiniCharts(summaries) {
      summaries.forEach(async (item, index) => {
        try {
          const response = await fetch(`/blog/${item.date}`);
          const data = await response.json();

          if (!data.success || !data.data?.rates?.length) return;

          const rates = data.data.rates;
          const canvas = document.getElementById(`canvas-${index}`);
          if (!canvas) return;

          const ctx = canvas.getContext('2d');
          new Chart(ctx, {
            type: 'line',
            data: {
              labels: rates.map(r => r.maturity),
              datasets: [{
                data: rates.map(r => r.rate),
                borderColor: '#6366f1',
                backgroundColor: 'rgba(99, 102, 241, 0.1)',
                fill: true,
                tension: 0.4,
                pointRadius: 3,
                pointBackgroundColor: GRADIENT_COLORS,
                borderWidth: 2,
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false }, tooltip: { enabled: false } },
              scales: {
                x: { display: false },
                y: { display: false }
              },
              animation: false
            }
          });
        } catch (e) {
          console.error('Error rendering mini chart:', e);
        }
      });
    }

    loadSummaries();
  </script>
</body>
</html>
