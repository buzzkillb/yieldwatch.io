services:
  db:
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-treasury}

  api:
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-treasury}
      NODE_ENV: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-}

  scheduler:
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-treasury}
      NODE_ENV: production
      CRON_TZ: ${CRON_TZ:-America/New_York}
      SCHEDULER_CRON_HOUR: ${SCHEDULER_CRON_HOUR:-16}
      SCHEDULER_CRON_MINUTE: ${SCHEDULER_CRON_MINUTE:-30}

  traefik:
    image: traefik:v3.0
    container_name: treasury-traefik
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./traefik/startup-validate.sh:/startup-validate.sh:ro
      - ./acme.json:/acme.json:rw
    environment:
      - CF_API_EMAIL=${CF_API_EMAIL}
      - CF_API_TOKEN=${CF_API_TOKEN}
      - DOMAIN=${DOMAIN}
    command: ["/startup-validate.sh"]
    restart: unless-stopped
    networks:
      - treasury-network

networks:
  treasury-network:
    external: false
