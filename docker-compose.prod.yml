version: "3.8"

services:
  db:
    image: postgres:17-alpine
    container_name: treasury-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-treasury}
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: treasury-api
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-treasury}
      NODE_ENV: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-}
    depends_on:
      - db
    restart: unless-stopped
    command: bun run src/index.ts

  scheduler:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: treasury-scheduler
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-treasury}
      NODE_ENV: production
      CRON_TZ: ${CRON_TZ:-America/New_York}
      SCHEDULER_CRON_HOUR: ${SCHEDULER_CRON_HOUR:-16}
      SCHEDULER_CRON_MINUTE: ${SCHEDULER_CRON_MINUTE:-30}
    depends_on:
      - db
    restart: unless-stopped
    command: bun run src/services/scheduler.ts

  traefik:
    image: traefik:v3.0
    container_name: treasury-traefik
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - ./acme.json:/acme.json:rw
    environment:
      - CF_API_EMAIL=${CF_API_EMAIL}
      - CLOUDFLARE_DNS_API_TOKEN=${CF_API_TOKEN}
      - DOMAIN=${DOMAIN}
    restart: unless-stopped
    networks:
      - treasury-network

networks:
  treasury-network:
    name: treasury-network
    driver: bridge